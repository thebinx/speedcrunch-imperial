# Verifies the Linux/CachyOS CMake build path.
name: Linux Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  linux-release:
    name: Linux release build
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev qt6-tools-dev qt6-tools-dev-tools libxkbcommon-dev

      - name: Configure
        run: cmake -S src --preset linux-release

      - name: Build
        run: cmake --build build/linux-release --target speedcrunch --parallel

      - name: Install
        run: cmake --install build/linux-release

      - name: Upload Linux install tree
        uses: actions/upload-artifact@v4
        with:
          name: SpeedCrunch-Imperial-Linux-x64
          path: dist/linux
