<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512"
     height="512">

  <defs>
    <!-- subtle modern background -->
    <radialGradient id="bgGlow" cx="35%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#8fc4e8"/>
      <stop offset="55%" stop-color="#67aad8"/>
      <stop offset="100%" stop-color="#4f95c6"/>
    </radialGradient>

    <!-- soft top-left sheen -->
    <linearGradient id="bgSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- subtle inner ring -->
    <linearGradient id="innerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- base background -->
  <rect x="32" y="32" width="448" height="448" rx="110" fill="url(#bgGlow)"/>

  <!-- subtle sheen overlay -->
  <rect x="32" y="32" width="448" height="448" rx="110" fill="url(#bgSheen)"/>

  <!-- hairline inner ring -->
  <rect x="40" y="40" width="432" height="432" rx="102"
